{% extends "base.html" %}
{% block title %}Login - CRM CPQ{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 20px 0;">
    <div class="card" style="width: 100%; max-width: 400px; margin: 0;">
        <div class="card-header">
            <h2>Login</h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% if request.GET.next %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
                {% endif %}
                {% if form.errors %}
                <div
                    style="color: #e74c3c; font-size: 14px; margin-bottom: 15px; background: #fadbd8; padding: 10px; border-radius: 4px;">
                    Your username and password didn't match. Please try again.
                </div>
                {% endif %}
                <div class="form-group">
                    <label for="id_username">Username or Email:</label>
                    <input type="text" id="id_username" name="username" class="form-input" required
                           value="{% if form.username.value %}{{ form.username.value }}{% elif request.GET.username %}{{ request.GET.username }}{% elif request.GET.email %}{{ request.GET.email }}{% endif %}">
                </div>
                <div class="form-group">
                    <label for="id_password">Password:</label>
                    <input type="password" id="id_password" name="password" class="form-input" required>
                </div>
                <div class="btn-group" style="display: flex; gap: 10px; align-items: center;">
                    <button type="submit" class="btn btn-primary">Login</button>
                    <a href="{% url 'registration' %}" class="btn btn-secondary"
                        style="text-decoration: none;">Register</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
