{% extends "base.html" %}
{% block title %}Confirm Delete - CRM CPQ{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto;">
    <div class="card">
        <div class="card-body" style="text-align: center;">
            <h2 style="color: #e74c3c; margin-bottom: 20px;">Confirm Delete</h2>
            <p style="font-size: 16px; margin-bottom: 10px;">Are you sure you want to delete</p>
            <p style="font-size: 18px; font-weight: bold; margin-bottom: 30px;">{{ object_name }}</p>
            <p style="color: #7f8c8d; margin-bottom: 30px;">This action cannot be undone.</p>
            
            <div class="btn-group" style="justify-content: center;">
                <form method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                </form>
                <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
