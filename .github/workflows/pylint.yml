name: Build, Scan, and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  lint:
    name: Pylint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run pylint on crm package
        run: |
          pylint crm --ignore=migrations

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: [lint, sonarqube]
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x "deploy.zip" \
            -x ".git/**" \
            -x ".github/**" \
            -x "__pycache__/**" \
            -x "*.pyc" \
            -x "*.pyo" \
            -x ".env" \
            -x "*.env" \
            -x "venv/**" \
            -x ".venv/**" \
            -x ".venv_local/**" \
            -x "db.sqlite3" \
            -x "staticfiles/**" \
            -x ".DS_Store" \
            -x "*.pem" \
            -x "*.log" \
            -x ".pytest_cache/**" \
            -x ".mypy_cache/**" \
            -x ".idea/**" \
            -x ".vscode/**" \
            -x "node_modules/**"

      - name: Show deployment package size
        run: |
          ls -lh deploy.zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
        with:
          aws-region: us-east-1
          application-name: "Raw foods"
          environment-name: "Rawfoods-env-2"
          version-label: github-${{ github.run_number }}
          deployment-package-path: deploy.zip